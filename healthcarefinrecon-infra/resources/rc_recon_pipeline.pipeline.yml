resources:
  pipelines:
    rc_recon_pipeline:
      name: healthcarefinrecon-rc-recon
      catalog: ${resources.schemas.rc_recon.catalog_name}
      schema: ${resources.schemas.rc_recon.name}
      channel: PREVIEW
      development: false
      continuous: false
      libraries:
        - file:
            path: ../src/pipeline/rc_recon_pipeline.py
      configuration:
        pipeline.catalog_use: "${resources.schemas.rc_recon.catalog_name}"
        pipeline.schema_use: "${resources.schemas.rc_recon.name}"
        pipeline.bundle_files_path: "${workspace.file_path}"
        pipelines.enableTrackHistory: "true"
      clusters:
        - label: default
          node_type_id: ${var.node_type}
          autoscale:
            min_workers: 1
            max_workers: 4
